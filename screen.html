function estimateRandomDimensions(e){
 const baseW=Number(settings.randomEntryWidth||320);

function initials(name){const t=String(name||'').trim();return t?t.slice(0,1).toUpperCase():'?'}
function messageContentHtml(e,i,isKakao=false){

function estimateEntryHeight(e,random=false){

function entryHtml(e,i,random=false,pos=null){

  const profileImage=String(settings.randomKakaoProfileImage||'').trim();

 }

function render(){

function startScrollDownward(){
