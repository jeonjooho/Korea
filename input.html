  function msgPos(e){const r=messageCanvas.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return{x:p.clientX-r.left,y:p.clientY-r.top};}
  function msgStart(e){e.preventDefault(); msgDrawing=true; msgLast=msgPos(e);}
  function msgMove(e){if(!msgDrawing)return; e.preventDefault(); const p=msgPos(e); mctx.beginPath(); mctx.moveTo(msgLast.x,msgLast.y); mctx.lineTo(p.x,p.y); mctx.stroke(); msgLast=p; hasMsgWriting=true;}
  function msgEnd(){msgDrawing=false; msgLast=null;}
  ['mousedown','touchstart'].forEach(x=>messageCanvas.addEventListener(x,msgStart,{passive:false})); ['mousemove','touchmove'].forEach(x=>messageCanvas.addEventListener(x,msgMove,{passive:false})); ['mouseup','mouseleave','touchend','touchcancel'].forEach(x=>messageCanvas.addEventListener(x,msgEnd));

  window.addEventListener('resize',resize); setTimeout(resize,120);
  E('clearSig').onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height); hasSig=false; status('',true);};

  let isSubmitting=false;

  function makeEntryId(name,organization,message,signature){
    const raw=[name,organization,message,signature].join('|');
    let hash=0;
    for(let i=0;i<raw.length;i++){
      hash=((hash<<5)-hash)+raw.charCodeAt(i);
      hash|=0;
    }
    return 'entry_'+Math.abs(hash)+'_'+String(raw.length);
  }

  E('submit').onclick=async()=>{
    if(isSubmitting){
      status('Message를 전송 중입니다. 잠시만 기다려 주세요.',true);
      return;
    }

    const submitBtn=E('submit');

    try{
      const handwritingMode=String((window.currentSettings&&window.currentSettings.messageHandwritingEnabled)||'no')==='yes';
      const typedMessage=E('message').value.trim();
      const messageImage=handwritingMode&&hasMsgWriting?messageCanvas.toDataURL('image/png'):'';
      const name=handwritingMode?'':E('name').value.trim();
      const organization=handwritingMode?'':E('organization').value.trim();
      const message=handwritingMode?'':typedMessage;
      if(handwritingMode){
        if(!hasMsgWriting){
          status('Please write your handwritten message.',false);
          alert('Please write your handwritten message.');
          return;
        }
      }else if(!name||!organization||!typedMessage||!hasSig){
        status('Name, organization, message, and signature are required.',false);
        alert('Please enter your name, organization, message, and signature.');
        return;
      }

      isSubmitting=true;
      submitBtn.disabled=true;
      submitBtn.style.opacity='0.55';
      submitBtn.style.cursor='not-allowed';
      submitBtn.textContent='Sending...';

      status('Firebase로 전송 중입니다...',true);

      const signature=handwritingMode?'':canvas.toDataURL('image/png');
      const entryId=makeEntryId(name,organization,message+(messageImage||''),signature);

      const item={
        id:entryId,
        name,
        organization,
        message,
        messageImage,
        messageMode: handwritingMode?'handwriting':'text',
        signature,
        createdAt:firebase.database.ServerValue.TIMESTAMP
      };

      // Use a deterministic entry ID instead of push().
      // Therefore, pressing Submit repeatedly for the same completed form cannot create duplicates.
      await entriesRef.child(entryId).set(item);

      status('Message가 성공적으로 저장되었습니다. Entry ID: '+entryId,true);
      E('name').value='';
      E('organization').value='';
      E('message').value='';
      ctx.clearRect(0,0,canvas.width,canvas.height);
      mctx.clearRect(0,0,messageCanvas.width,messageCanvas.height);
      hasSig=false; hasMsgWriting=false;
      E('ok').style.display='block';
      setTimeout(()=>E('ok').style.display='none',2500);
      await sendAction({type:'show-visitor-book'});
    }catch(e){
      console.error(e);
      status('Firebase 저장 오류: '+(e && e.message ? e.message : e),false);
      alert('Firebase 저장 오류: '+(e && e.message ? e.message : e));
    }finally{
      isSubmitting=false;
      submitBtn.disabled=false;
      submitBtn.style.opacity='1';
      submitBtn.style.cursor='pointer';
      submitBtn.textContent=(window.currentSettings&&window.currentSettings.submitButtonText)||'Message 제출';
    }
  };

  const fullBtns=[E('fullscreen'),E('homeFullscreen')].filter(Boolean); function updateFullButton(){fullBtns.forEach(btn=>btn.textContent=document.fullscreenElement?'Exit Full Screen':'Full Screen');} async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen(); else await document.exitFullscreen();}catch(e){alert('이 브라우저에서는 Full Screen 모드를 사용할 수 없습니다.');}} fullBtns.forEach(btn=>btn.onclick=toggleFullscreen); document.addEventListener('fullscreenchange',()=>{updateFullButton();setTimeout(resize,100);}); updateFullButton();
  status('Firebase 연결 완료. Message를 제출할 수 있습니다.',true);
})();
</script></body></html>
