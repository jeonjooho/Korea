<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Visitor Input</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;background:linear-gradient(135deg,var(--input-bg,#eaf4ff),#ffffff);color:var(--input-text,#122044)}body{overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}.wrap{max-width:980px;margin:0 auto;padding:28px}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.messageTitle{font-size:var(--message-title-size,38px);color:var(--title-color,#0b4fd7);margin:0 0 8px}.card{background:var(--message-card,#fff);border-radius:22px;padding:24px;box-shadow:0 8px 30px #7692b344;margin-top:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}label{display:block;font-weight:700;margin:14px 0 8px;font-size:var(--label-size,16px)}input,textarea{width:100%;font-size:var(--field-size,20px);padding:14px;border:2px solid #c7d7ef;border-radius:14px}textarea{height:110px;resize:vertical}.sigbox{border:2px dashed #8cb0dd;border-radius:18px;background:var(--sig-bg,#fff);height:260px;touch-action:none;position:relative}canvas{width:100%;height:100%;display:block}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}button{border:0;border-radius:14px;padding:16px 24px;font-size:18px;font-weight:800;cursor:pointer}.submit{background:var(--submit-bg,#0b4fd7);color:white}.clear{background:var(--clear-bg,#e8eef8);color:#17335f}.fullscreen{background:#17335f;color:white;white-space:nowrap}.hint{color:#51617f;line-height:1.5;font-size:var(--message-hint-size,16px)}.ok{display:none;margin-top:12px;color:#11803a;font-weight:800}.screen{display:none;position:fixed;inset:0;width:100vw;height:100dvh;overflow:auto;background:linear-gradient(135deg,var(--input-bg,#eaf4ff),#ffffff)}.screen.active{display:block}.home{display:none;place-items:center;padding:28px}.home.active{display:grid}.homeCard{width:min(92vw,var(--home-card-width,720px));background:var(--home-card,#fff);border-radius:28px;padding:var(--home-card-padding,42px);transform:translate(var(--home-card-x,0px),var(--home-card-y,0px));box-shadow:0 12px 44px #7692b344;text-align:center}.homeTitle{font-size:var(--home-title-size,44px);line-height:1.1;margin:0 0 12px;color:var(--title-color,#0b4fd7)}.homeHint{font-size:var(--home-hint-size,20px);color:#51617f;margin:0 0 30px}.homeFull{position:fixed;right:22px;bottom:22px;z-index:50;box-shadow:0 8px 22px rgba(20,40,80,.25);display:none}.home.active .homeFull{display:block}.menuBtns{display:grid;grid-template-columns:1fr 1fr;gap:18px}.menuBtns.positioned{display:block;position:relative;width:100%;min-height:220px}.menuBtns.positioned .menuBtn{position:absolute;display:grid;place-items:center;padding:8px 12px}.menuBtns .quizBtn{grid-column:1 / -1}.videoBtn{background:var(--video-btn,#7c3aed);color:white}.menuBtn{font-size:var(--menu-button-size,28px);padding:34px 20px;border-radius:22px;box-shadow:0 8px 22px rgba(20,60,130,.18)}.messageBtn{background:var(--message-btn,#0b4fd7);color:white}.quizBtn{background:var(--quiz-btn,#209147);color:white}.back{background:#e8eef8;color:#17335f}.quizWrap{max-width:760px;margin:0 auto;padding:28px;min-height:100dvh;display:flex;flex-direction:column;justify-content:center}.quizCard{background:var(--quiz-card,#fff);border-radius:28px;padding:34px;text-align:center;box-shadow:0 12px 44px #7692b344}.qrImg{width:min(72vw,var(--qr-size,430px));height:auto;border-radius:18px;box-shadow:0 8px 24px rgba(20,40,80,.18);margin:20px auto 10px;display:block}.quizTitle{font-size:var(--quiz-title-size,42px);margin:0;color:var(--title-color,#0b4fd7)}.quizText{font-size:var(--quiz-text-size,22px);color:#51617f;line-height:1.45}.topActions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.homeSmall{background:#e8eef8;color:#17335f;white-space:nowrap}@media(max-width:720px){.row{grid-template-columns:1fr}.topbar{display:block}.fullscreen{margin-top:10px}.menuBtns{grid-template-columns:1fr}.menuBtns .quizBtn{grid-column:auto}.homeTitle{font-size:calc(var(--home-title-size,44px) * .78)}.menuBtn{font-size:calc(var(--menu-button-size,28px) * .85)}.topActions{margin-top:10px;flex-wrap:wrap}}
</style></head><body>
<section id="homeScreen" class="screen active home"><button class="fullscreen homeFull" id="homeFullscreen" type="button">Full Screen</button><div class="homeCard"><h1 class="homeTitle" id="homeTitleText">Digital Visitor's Book</h1><p class="homeHint" id="homeHintText">Please choose one option.</p><div class="menuBtns"><button class="menuBtn messageBtn" id="goMessage" type="button">Leave a Message</button><button class="menuBtn videoBtn" id="goVideo" type="button">Watch Video</button><button class="menuBtn quizBtn" id="goQuiz" type="button">Play Quiz</button></div></div></section>
<section id="messageScreen" class="screen"><div class="wrap"><div class="topbar"><div><h1 class="messageTitle" id="messageScreenTitleText">Digital Visitor's Book</h1><p class="hint" id="messageScreenHintText">Please leave your name, organization, signature, and message.</p></div><div class="topActions"><button class="homeSmall" id="backHome1" type="button">Home</button><button class="fullscreen" id="fullscreen" type="button">Full Screen</button></div></div><div class="card"><div class="row"><div><label for="name">Name</label><input id="name" autocomplete="name" placeholder="Enter your name"></div><div><label for="organization">Organization / Affiliation</label><input id="organization" autocomplete="organization" placeholder="Enter your organization"></div></div><label for="message">Message</label><textarea id="message" placeholder="Write your message"></textarea><label>Signature</label><div class="sigbox"><canvas id="canvas"></canvas></div><div class="actions"><button class="clear" id="clearSig">Clear Signature</button><button class="submit" id="submit">Submit Message</button></div><div class="ok" id="ok">Thank you. Your message has been submitted.</div><div id="debugStatus" style="margin-top:10px;color:#b91c1c;font-weight:800;line-height:1.4"></div></div></div></section>
<section id="quizScreen" class="screen"><div class="quizWrap"><div class="topActions"><button class="back" id="backHome2" type="button">Home</button></div><div class="quizCard"><h1 class="quizTitle" id="quizTitleText">Play Quiz</h1><p class="quizText" id="quizTextText">Scan this QR code to participate in the quiz.</p><img class="qrImg" id="quizQrImg" src="quiz_qr.png" alt="Quiz QR Code"></div></div></section>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(function(){
  const DEFAULT_SETTINGS={homeTitle:"Digital Visitor's Book",homeHint:'Please choose one option.',homeTitleSize:'44',homeHintSize:'20',homeCardColor:'#ffffff',homeCardX:'0',homeCardY:'0',homeCardWidth:'720',homeCardPadding:'42',inputBackgroundColor:'#eaf4ff',inputBackgroundImages:'',inputBackgroundInterval:'10',leaveButtonX:'0',leaveButtonY:'0',leaveButtonWidth:'48',leaveButtonHeight:'88',videoButtonX:'52',videoButtonY:'0',videoButtonWidth:'48',videoButtonHeight:'88',quizButtonX:'0',quizButtonY:'108',quizButtonWidth:'100',quizButtonHeight:'88',inputTextColor:'#122044',leaveButtonText:'Leave a Message',quizButtonText:'Play Quiz',videoButtonText:'Watch Video',menuButtonFontSize:'28',messageButtonColor:'#0b4fd7',quizButtonColor:'#209147',videoButtonColor:'#7c3aed',messageScreenTitle:"Digital Visitor's Book",messageScreenHint:'Please leave your name, organization, signature, and message.',messageScreenTitleSize:'38',messageScreenHintSize:'16',messageCardColor:'#ffffff',labelFontSize:'16',fieldFontSize:'20',signatureBoxColor:'#ffffff',submitButtonColor:'#0b4fd7',clearButtonColor:'#e8eef8',quizTitle:'Play Quiz',quizText:'Scan this QR code to participate in the quiz.',quizTitleSize:'42',quizTextSize:'22',quizCardColor:'#ffffff',qrSize:'430',quizWebsiteUrl:'https://www.iaea.org/events/ministerial-nuclear-power-conference-2026',quizQrDataUrl:'',videoFileUrl:'',videoTitle:'Watch Video',titleColor:'#0b4fd7'};
  function E(id){return document.getElementById(id);}
  function status(msg, ok){const d=E('debugStatus'); if(d){d.style.color=ok?'#11803a':'#b91c1c'; d.textContent=msg;} console.log(msg);}
  function requireFirebase(){
    if(typeof firebase==='undefined'){status('Firebase SDK is not loaded. Check the gstatic script lines.',false); return null;}
    if(!window.db){status('Firebase is not initialized. Check firebase-config.js and make sure databaseURL is included.',false); return null;}
    return window.db;
  }
  const database=requireFirebase();
  if(!database){return;}
  const entriesRef=database.ref('visitorBook/entries');
  const settingsRef=database.ref('visitorBook/settings');
  const actionRef=database.ref('visitorBook/screenAction');


  function splitImageUrls(value){return String(value||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);}
  function setInputBackground(s){
    const screens=document.querySelectorAll('.screen');
    const urls=splitImageUrls(s.inputBackgroundImages);
    if(inputBgTimer){clearInterval(inputBgTimer);inputBgTimer=null;}
    function applyOne(url){
      const base=url?`linear-gradient(rgba(255,255,255,.12),rgba(255,255,255,.12)), url("${url.replace(/"/g,'%22')}") center/cover no-repeat`:'';
      document.body.style.background=base||`linear-gradient(135deg,${s.inputBackgroundColor||'#eaf4ff'},#ffffff)`;
      screens.forEach(el=>{el.style.background=base||`linear-gradient(135deg,${s.inputBackgroundColor||'#eaf4ff'},#ffffff)`;});
    }
    if(urls.length){
      inputBgIndex=inputBgIndex%urls.length;
      applyOne(urls[inputBgIndex]);
      if(urls.length>1){inputBgTimer=setInterval(()=>{inputBgIndex=(inputBgIndex+1)%urls.length;applyOne(urls[inputBgIndex]);},Math.max(1,Number(s.inputBackgroundInterval||10))*1000);}
    }else applyOne('');
  }
  function setHomeButtonLayout(s){
    const area=document.querySelector('.menuBtns');
    if(!area)return;
    area.classList.add('positioned');
    const maxBottom=Math.max(Number(s.leaveButtonY||0)+Number(s.leaveButtonHeight||88),Number(s.videoButtonY||0)+Number(s.videoButtonHeight||88),Number(s.quizButtonY||108)+Number(s.quizButtonHeight||88));
    area.style.height=(maxBottom+20)+'px';
    const map=[['goMessage','leaveButton'],['goVideo','videoButton'],['goQuiz','quizButton']];
    map.forEach(([id,key])=>{const el=E(id); if(!el)return; el.style.left=(s[key+'X']||0)+'%'; el.style.top=(s[key+'Y']||0)+'px'; el.style.width=(s[key+'Width']||48)+'%'; el.style.height=(s[key+'Height']||88)+'px';});
  }

  function applySettings(s){
    s={...DEFAULT_SETTINGS,...(s||{})}; const r=document.documentElement.style;
    r.setProperty('--title-color',s.titleColor); r.setProperty('--input-bg',s.inputBackgroundColor); r.setProperty('--input-text',s.inputTextColor); r.setProperty('--home-card',s.homeCardColor); r.setProperty('--home-card-x',(s.homeCardX||0)+'px'); r.setProperty('--home-card-y',(s.homeCardY||0)+'px'); r.setProperty('--home-card-width',(s.homeCardWidth||720)+'px'); r.setProperty('--home-card-padding',(s.homeCardPadding||42)+'px'); r.setProperty('--home-title-size',s.homeTitleSize+'px'); r.setProperty('--home-hint-size',s.homeHintSize+'px'); r.setProperty('--menu-button-size',s.menuButtonFontSize+'px'); r.setProperty('--message-btn',s.messageButtonColor); r.setProperty('--quiz-btn',s.quizButtonColor); r.setProperty('--video-btn',s.videoButtonColor); r.setProperty('--message-card',s.messageCardColor); r.setProperty('--message-title-size',s.messageScreenTitleSize+'px'); r.setProperty('--message-hint-size',s.messageScreenHintSize+'px'); r.setProperty('--label-size',s.labelFontSize+'px'); r.setProperty('--field-size',s.fieldFontSize+'px'); r.setProperty('--sig-bg',s.signatureBoxColor); r.setProperty('--submit-bg',s.submitButtonColor); r.setProperty('--clear-bg',s.clearButtonColor); r.setProperty('--quiz-card',s.quizCardColor); r.setProperty('--quiz-title-size',s.quizTitleSize+'px'); r.setProperty('--quiz-text-size',s.quizTextSize+'px'); r.setProperty('--qr-size',s.qrSize+'px');
    setInputBackground(s);setHomeButtonLayout(s);E('homeTitleText').textContent=s.homeTitle; E('homeHintText').textContent=s.homeHint; E('goMessage').textContent=s.leaveButtonText; E('goQuiz').textContent=s.quizButtonText; E('goVideo').textContent=s.videoButtonText; E('messageScreenTitleText').textContent=s.messageScreenTitle; E('messageScreenHintText').textContent=s.messageScreenHint; E('quizTitleText').textContent=s.quizTitle; E('quizTextText').textContent=s.quizText; E('quizQrImg').src=s.quizQrDataUrl||'quiz_qr.png';
    window.currentSettings=s; setTimeout(resize,80);
  }
  settingsRef.on('value',snap=>{ if(snap.exists()) applySettings(snap.val()); else settingsRef.set(DEFAULT_SETTINGS).then(()=>applySettings(DEFAULT_SETTINGS)); },err=>status('Firebase settings read error: '+err.message,false));

  function showScreen(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active')); E(id).classList.add('active'); if(id==='messageScreen')setTimeout(resize,100);}
  function normalizeUrl(url){url=String(url||'').trim(); if(!url)return ''; if(!/^https?:\/\//i.test(url))url='https://'+url; return url;}
  function sendAction(action){return actionRef.set({...action,appFullScreen:true,createdAt:firebase.database.ServerValue.TIMESTAMP});}
  E('goMessage').onclick=()=>{sendAction({type:'show-visitor-book'});showScreen('messageScreen');};
  E('goVideo').onclick=()=>{const s=window.currentSettings||DEFAULT_SETTINGS; const url=(s.videoFileUrl||'').trim(); if(!url){alert('Please set the video file path in start.html first.');return;} sendAction({type:'open-video-window',url,title:s.videoTitle||'Watch Video'});};
  E('goQuiz').onclick=()=>{const s=window.currentSettings||DEFAULT_SETTINGS; const url=normalizeUrl(s.quizWebsiteUrl); if(!url){alert('Please set the quiz website URL in start.html first.');return;} showScreen('quizScreen'); sendAction({type:'open-quiz-window',url});};
  E('backHome1').onclick=()=>showScreen('homeScreen'); E('backHome2').onclick=()=>showScreen('homeScreen');

  const canvas=E('canvas'),ctx=canvas.getContext('2d'); let drawing=false,hasSig=false,last=null;
  function resize(){const r=canvas.getBoundingClientRect(); if(!r.width||!r.height)return; const d=window.devicePixelRatio||1; const old=hasSig?canvas.toDataURL():null; canvas.width=r.width*d; canvas.height=r.height*d; ctx.setTransform(d,0,0,d,0,0); ctx.lineWidth=4; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0c1d3d'; if(old){const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height); img.src=old;}}
  function pos(e){const r=canvas.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return{x:p.clientX-r.left,y:p.clientY-r.top};}
  function start(e){e.preventDefault(); drawing=true; last=pos(e);}
  function move(e){if(!drawing)return; e.preventDefault(); const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; hasSig=true;}
  function end(){drawing=false; last=null;}
  ['mousedown','touchstart'].forEach(x=>canvas.addEventListener(x,start,{passive:false})); ['mousemove','touchmove'].forEach(x=>canvas.addEventListener(x,move,{passive:false})); ['mouseup','mouseleave','touchend','touchcancel'].forEach(x=>canvas.addEventListener(x,end));
  window.addEventListener('resize',resize); setTimeout(resize,120);
  E('clearSig').onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height); hasSig=false; status('',true);};

  let isSubmitting=false;

  function makeEntryId(name,organization,message,signature){
    const raw=[name,organization,message,signature].join('|');
    let hash=0;
    for(let i=0;i<raw.length;i++){
      hash=((hash<<5)-hash)+raw.charCodeAt(i);
      hash|=0;
    }
    return 'entry_'+Math.abs(hash)+'_'+String(raw.length);
  }

  E('submit').onclick=async()=>{
    if(isSubmitting){
      status('This message is already being sent. Please wait.',true);
      return;
    }

    const submitBtn=E('submit');

    try{
      const name=E('name').value.trim(), organization=E('organization').value.trim(), message=E('message').value.trim();
      if(!name||!organization||!message||!hasSig){
        status('Name, organization, message, and signature are required.',false);
        alert('Please enter your name, organization, message, and signature.');
        return;
      }

      isSubmitting=true;
      submitBtn.disabled=true;
      submitBtn.style.opacity='0.55';
      submitBtn.style.cursor='not-allowed';
      submitBtn.textContent='Sending...';

      status('Sending to Firebase...',true);

      const signature=canvas.toDataURL('image/png');
      const entryId=makeEntryId(name,organization,message,signature);

      const item={
        id:entryId,
        name,
        organization,
        message,
        signature,
        createdAt:firebase.database.ServerValue.TIMESTAMP
      };

      // Use a deterministic entry ID instead of push().
      // Therefore, pressing Submit repeatedly for the same completed form cannot create duplicates.
      await entriesRef.child(entryId).set(item);

      status('Message sent successfully. Entry ID: '+entryId,true);
      E('name').value='';
      E('organization').value='';
      E('message').value='';
      ctx.clearRect(0,0,canvas.width,canvas.height);
      hasSig=false;
      E('ok').style.display='block';
      setTimeout(()=>E('ok').style.display='none',2500);
      await sendAction({type:'show-visitor-book'});
    }catch(e){
      console.error(e);
      status('Firebase write error: '+(e && e.message ? e.message : e),false);
      alert('Firebase write error: '+(e && e.message ? e.message : e));
    }finally{
      isSubmitting=false;
      submitBtn.disabled=false;
      submitBtn.style.opacity='1';
      submitBtn.style.cursor='pointer';
      submitBtn.textContent='Submit Message';
    }
  };

  const fullBtns=[E('fullscreen'),E('homeFullscreen')].filter(Boolean); function updateFullButton(){fullBtns.forEach(btn=>btn.textContent=document.fullscreenElement?'Exit Full Screen':'Full Screen');} async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen(); else await document.exitFullscreen();}catch(e){alert('Full screen mode is not available in this browser.');}} fullBtns.forEach(btn=>btn.onclick=toggleFullscreen); document.addEventListener('fullscreenchange',()=>{updateFullButton();setTimeout(resize,100);}); updateFullButton();
  status('Firebase ready. You can submit a message.',true);
})();
</script></body></html>
