function normalizePercentHeight(value, fallback, maxValue){
 const n=Number(value);
 const max=Number(maxValue||100);
 if(!Number.isFinite(n)) return fallback;
 const pct=n>100 ? (n/window.innerHeight*100) : n;
 return Math.max(1,Math.min(max,pct));

function handleEntriesUpdate(nextEntries){
 const nextKeys=nextEntries.map(e=>e.key);
 const prevKeys=previousEntryKeys;
 const isFirstLoad=(prevKeys===null);
 // Only try the gentle card animation when: this isn't the very first load, we're in
 // the scrolling "vertical2" guestbook layout, and downward scrolling is on. Any other
 // situation (first load, layout change, or entries removed) falls back to the normal
 // full re-render. Any number of newly-added entries is fine here: the single newest
 // one gets the center-stage announcement, and if others arrived in the same batch
 // they're merged straight into the scroll (see below).
 const canAnimateSingle=!isFirstLoad && settings && settings.layoutMode==='vertical2' && settings.scrollEnabled==='yes';
 entries=nextEntries;
 previousEntryKeys=nextKeys;
 if(canAnimateSingle){
  const prevSet=new Set(prevKeys);
  const addedKeys=nextKeys.filter(k=>!prevSet.has(k));
  const removedAny=prevKeys.some(k=>!nextKeys.includes(k));
  if(addedKeys.length>=1 && !removedAny){
   const addedEntries=addedKeys.map(k=>nextEntries.find(e=>e.key===k)).filter(e=>e && e.showOnScreen!==false);
   if(addedEntries.length){
    // Newest-first: the very last one (by createdAt) gets the center-stage
    // announcement; any others that arrived in the same batch are merged straight
    // into the scroll immediately, with no announcement delay and no isolated
    // "alone with a big empty gap" page — they just join the other messages.
    addedEntries.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    const newest=addedEntries[addedEntries.length-1];
    const rest=addedEntries.slice(0,-1);
    if(rest.length && !mergeEntriesIntoScroll(rest)){ render(); return; }
    announceNewEntry(newest);
    return;
   }
  }

function announceNewEntry(entry){

 const boxH=Math.max(160, largeBox.clientHeight || window.innerHeight*normalizePercentHeight(settings.largeBoxHeight,68,100)/100);
 const dims=vertical2ScatterDims(entry);
 const w=Math.min(dims.w, Math.max(120,boxW-24));
 const h=Math.min(dims.h, Math.max(90,boxH-24));
 const x=Math.max(0,(boxW-w)/2);
 const overlay=document.createElement('div');
 overlay.id='incomingEntryOverlay';
 overlay.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;z-index:6;pointer-events:none;overflow:hidden;';
 const card=document.createElement('div');
 card.style.cssText=`position:absolute;left:${x}px;top:-${h+20}px;width:${w}px;transition:top .8s ease,opacity .8s ease;opacity:0;`;

 overlay.appendChild(card);

  card.style.top=Math.max(10,(boxH-h)/2)+'px';
  card.style.opacity='1';
 });});

 incomingEntryTimer=setTimeout(()=>{
  card.style.transition='top .6s ease,opacity .6s ease';
  card.style.top=(boxH+20)+'px';
  card.style.opacity='0';
  incomingEntryTimer=setTimeout(()=>{
   const el=document.getElementById('incomingEntryOverlay');
   if(el)el.remove();
   mergeNewEntryIntoScroll(entry);
  },620);
 },holdMs);
}

function buildRowMarkup(list,perRow){

function startScrollDownward(initialY){

// Called once a freshly-arrived entry's center-stage announcement finishes.
//
// Earlier attempts either (a) gave the new entry its own separate mini-page — which
// meant it always scrolled by alone, looking like an isolated, oddly-spaced item — or
// (b) did a full re-render and just tried to resume the scroll partway through the new
// loop — which did nothing to make the NEW entry itself show up quickly, since where in
// the document it lands (right at the very front, as the newest item) has no relation
// to which point in the loop happened to resume from — or (c) targeted the "next" page
// assuming it was fully off-screen; but since every page is exactly as tall as the
// visible box itself, the viewport is almost always showing a blend of the tail of one
// page and the head of the next, so that "next" page was already partly on screen too,
// and the extra wait for it to fully arrive was still noticeable.
//
// This version instead edits the page that is CURRENTLY on screen right now — adding
// the new entry into that page's existing small group of entries and re-packing just
// that one page. The new entry then appears essentially immediately, already mixed in
// among other entries. The trade-off is that the other entries already showing on that
// one page may shift position slightly as it re-packs — a brief, one-time, one-page
// reflow — which is far less disruptive than resetting the whole scroll back to start.
// Merges one or more freshly-arrived entries directly into the page of the scroll
// that's currently on screen, alongside the entries already there — so they show up
// immediately, mixed in with other messages, instead of waiting for a future full
// render (and instead of ever landing alone on their own near-empty page).
// Returns true on success, false if the fast merge wasn't possible (caller should
// fall back to a full render() in that case).
function mergeEntriesIntoScroll(newEntries){
 const toMerge=(Array.isArray(newEntries)?newEntries:[newEntries]).filter(Boolean);
 if(!toMerge.length) return true;
 const segments=list.querySelectorAll('.scrollSegment');
 if(!(settings.layoutMode==='vertical2' && settings.scrollEnabled==='yes') || segments.length<3 || !ticker || !lastVertical2Groups || !lastVertical2Groups.groups.length){
  return false;
 }
 const {groups, boxW, boxH}=lastVertical2Groups;
 const firstSegChildren=Array.from(segments[0].children);
 if(firstSegChildren.length!==groups.length) return false; // cache out of sync with the DOM — fall back safely
 const oldCycle=Math.max(1,segments[0].scrollHeight);
 const m=/translateY\(([-\d.]+)px\)/.exec(list.style.transform||'');
 const oldT=m?parseFloat(m[1]):-oldCycle;
 const yOld=oldT+oldCycle;
 const topOffset=((oldCycle-yOld)%oldCycle+oldCycle)%oldCycle;
 const targetIndex=Math.floor(topOffset/boxH)%groups.length;
 const targetGroup=groups[targetIndex];
 // Newest first, same ordering convention used everywhere else ("shown" is sorted
 // newest-first), so the freshest of the batch ends up first among the new arrivals.
 const orderedNew=toMerge.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
 const newItems=orderedNew.concat(targetGroup.items);
 const newDims=newItems.map(vertical2ScatterDims);
 const newBest=bestFitScale(newDims, boxW, boxH);
 const newPositions=assignPositions(newDims, boxW, boxH, newBest, 1);
 const itemsHtml=newItems.map((e,gi)=>vertical2EntryHtml(e, gi, false, newPositions[gi])).join('');
 groups[targetIndex]={items:newItems, dims:newDims, best:newBest};
 segments.forEach(seg=>{
  const pageEl=seg.children[targetIndex];
  if(pageEl) pageEl.innerHTML=itemsHtml;
 });
 return true;
}
function mergeNewEntryIntoScroll(entry){

}
function updateFullscreenButton(){fullscreenBtn.textContent=document.fullscreenElement?'Exit Full Screen':'Full Screen';}

// Entering/leaving full screen changes the browser viewport size, which the large
// scrolling box (sized in vw/vh) already follows visually — but the downward-scroll
// animation loop and the vertical2 page layout were computed for the OLD box size, so
// without a re-render the messages stay confined to the box's previous, smaller
// dimensions. Re-running render() a beat after the change (once the browser has
// actually finished resizing) lets the guestbook re-lay itself out to fill the new,
// larger box.
function reflowAfterViewportChange(){
 const old=document.getElementById('incomingEntryOverlay');
 if(old)return; // don't interrupt the single-entry announcement animation
 requestAnimationFrame(()=>requestAnimationFrame(render));
}

function getYouTubeId(u){let m=String(u).match(/[?&]v=([^&]+)/)||String(u).match(/youtu\.be\/([^?&/]+)/);return m?m[1]:''} function embedUrl(u){const y=getYouTubeId(u);return y?'https://www.youtube.com/embed/'+y+'?autoplay=1':''}
let closingVideoTimer=null;
function isDirectPlayable(url){url=String(url||'').trim(); return url.toUpperCase()==='LOCAL' || (!!url && !embedUrl(url));}
function openVideo(url,slot,onEndedOverride){
 slot=String(slot||'1');
 url=String(url||'').trim();
 if(url.toUpperCase()==='LOCAL')url=(slot==='2'?selectedLocalVideoUrl2:selectedLocalVideoUrl);
 if(!url){alert('영상 URL 또는 로컬 영상이 선택되지 않았습니다.');return}
 // If a fade-out from a previous close was still in progress, cancel it first.
 if(closingVideoTimer){clearTimeout(closingVideoTimer);closingVideoTimer=null;}
 const fadeInMs=Math.max(0,Number(settings.videoFadeInDuration ?? 0.8))*1000;
 videoPlayer.onended=null;
 if(fadeInMs>0){
  // Start fully transparent, show the overlay, force the browser to register that
  // state, then animate to fully opaque — this is what makes the fade-IN visible
  // rather than jumping straight from 0 to 1 in the same frame.
  videoOverlay.style.transition='none';
  videoOverlay.style.opacity='0';
  videoOverlay.style.display='block';
  void videoOverlay.offsetWidth;
  videoOverlay.style.transition=`opacity ${fadeInMs}ms ease`;
  videoOverlay.style.opacity='1';
 } else {
  videoOverlay.style.transition='none';
  videoOverlay.style.opacity='1';
  videoOverlay.style.display='block';
 }
 const emb=embedUrl(url);
 if(emb){
  // YouTube-style embeds: the browser can't tell us when playback ends, so this case
  // still requires a manual close via the "닫기" button.
  videoPlayer.style.display='none';videoFrame.style.display='block';videoFrame.src=emb;
 } else {
  videoFrame.style.display='none';videoPlayer.style.display='block';videoPlayer.src=url;videoPlayer.play().catch(()=>{});
  // By default, when a direct video file / local video finishes, automatically close
  // the overlay and return to the guestbook screen — unless the caller (e.g. the
  // 1→2 sequential feature) supplies its own onEndedOverride to chain to another video.
  videoPlayer.onended=onEndedOverride||(()=>{videoPlayer.onended=null;closeVid();});
 }
}
function closeVid(){

 function finishClose(){
  videoOverlay.style.display='none';
  videoOverlay.style.transition='none';
  videoOverlay.style.opacity='1';
  videoPlayer.pause();
  videoPlayer.removeAttribute('src');
  videoFrame.removeAttribute('src');
  closingVideoTimer=null;
 }
 if(fadeOutMs<=0){finishClose();return;}

}
