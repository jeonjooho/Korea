<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screen Display</title>
<style>
*{box-sizing:border-box} body{margin:0;width:100vw;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;background:#eaf5ff;color:#102044}
#titleArea{position:fixed;left:3vw;right:3vw;top:24px;text-align:center;z-index:2} #screenTitle{margin:0} #screenSubtitle{margin:10px 0 0}
#largeBox{position:fixed;overflow:hidden;border-radius:22px;box-shadow:0 12px 34px rgba(60,100,160,.22);z-index:1}
#list{position:relative;display:flex;flex-direction:column}
.entry{position:relative;display:grid;grid-template-columns:220px 150px 1fr 120px;align-items:center;gap:8px;border:1px solid #c9dcf3;border-radius:14px;overflow:hidden;background-size:cover;background-position:center}
.name,.org,.message,.time{position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis} .name,.org{white-space:nowrap} .message{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical} .signature img{max-width:100%;max-height:54px;object-fit:contain;position:relative;z-index:1}
#registryBtn,#fullscreenBtn{position:fixed;right:18px;z-index:20;border:0;border-radius:12px;padding:12px 16px;background:#17335f;color:white;font-weight:900;cursor:pointer} #registryBtn{bottom:70px} #fullscreenBtn{bottom:18px}
#registry{display:none;position:fixed;inset:4vh 4vw;z-index:100;background:white;border-radius:18px;box-shadow:0 20px 50px #0005;padding:20px;overflow:auto} #registry table{width:100%;border-collapse:collapse} #registry th,#registry td{border-bottom:1px solid #ddd;padding:8px;text-align:left;font-size:14px} #registryClose{float:right}
#videoOverlay{display:none;position:fixed;inset:0;z-index:80;background:#000} #videoOverlay video,#videoOverlay iframe{width:100vw;height:100dvh;border:0;object-fit:contain} #closeVideo{position:fixed;right:18px;top:18px;z-index:81}
#localVideoPicker{position:fixed;left:18px;bottom:18px;z-index:30;background:#ffffffe8;border:1px solid #ccc;border-radius:12px;padding:10px;max-width:340px}
</style></head><body>
<div id="titleArea"><h1 id="screenTitle"></h1><p id="screenSubtitle"></p></div>
<div id="largeBox"><div id="list"></div></div>
<button id="registryBtn">Registry</button><button id="fullscreenBtn">Full Screen</button>
<div id="localVideoPicker"><b>Local Video on This Screen Computer</b><br><input id="localVideoFile" type="file" accept="video/*"><div id="localVideoStatus">Select local video, then use LOCAL in Start.</div></div>
<div id="videoOverlay"><button id="closeVideo">Close</button><video id="videoPlayer" controls playsinline preload="auto"></video><iframe id="videoFrame" style="display:none"></iframe></div>
<div id="registry"><button id="registryClose">Close</button><h2>Registry</h2><table><thead><tr><th>Show</th><th>Name</th><th>Organization</th><th>Message</th><th>Time</th></tr></thead><tbody id="registryBody"></tbody></table></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

const DEFAULT_SETTINGS = {"indexTitle": "Digital Visitor's Book", "indexTitleFont": "Arial", "indexTitleSize": 36, "indexTitleColor": "#0b4fd7", "indexSubtitle": "Firebase online version for GitHub Pages", "indexBgColor": "#eaf4ff", "indexBgImage": "", "indexBoxColor": "#ffffff", "indexBoxImage": "", "indexBoxWidth": 680, "indexBoxTop": 0, "adminBtnText": "Admin / Start", "inputBtnText": "Open Input Screen", "screenBtnText": "Open Screen Display", "adminBtnX": 0, "adminBtnY": 0, "adminBtnWidth": 100, "adminBtnHeight": 60, "adminBtnColor": "#0b4fd7", "adminBtnImage": "", "adminBtnFont": "Arial", "adminBtnFontSize": 22, "adminBtnTextColor": "#ffffff", "inputBtnX": 0, "inputBtnY": 0, "inputBtnWidth": 100, "inputBtnHeight": 60, "inputBtnColor": "#7c3aed", "inputBtnImage": "", "inputBtnFont": "Arial", "inputBtnFontSize": 22, "inputBtnTextColor": "#ffffff", "screenBtnX": 0, "screenBtnY": 0, "screenBtnWidth": 100, "screenBtnHeight": 60, "screenBtnColor": "#209147", "screenBtnImage": "", "screenBtnFont": "Arial", "screenBtnFontSize": 22, "screenBtnTextColor": "#ffffff", "inputBgColor": "#eaf4ff", "inputBgImage": "", "inputHomeBoxColor": "#ffffff", "inputHomeBoxImage": "", "inputHomeTitle": "Digital Visitor's Book", "inputHomeHint": "Please choose one option.", "leaveBtnText": "Leave a Message", "videoBtnText": "Watch Video", "quizBtnText": "Play Quiz", "leaveBtnX": 0, "leaveBtnY": 0, "leaveBtnWidth": 48, "leaveBtnHeight": 88, "leaveBtnColor": "#0b4fd7", "leaveBtnImage": "", "leaveBtnFont": "Arial", "leaveBtnFontSize": 28, "leaveBtnTextColor": "#ffffff", "videoBtnX": 52, "videoBtnY": 0, "videoBtnWidth": 48, "videoBtnHeight": 88, "videoBtnColor": "#7c3aed", "videoBtnImage": "", "videoBtnFont": "Arial", "videoBtnFontSize": 28, "videoBtnTextColor": "#ffffff", "quizBtnX": 0, "quizBtnY": 108, "quizBtnWidth": 100, "quizBtnHeight": 88, "quizBtnColor": "#209147", "quizBtnImage": "", "quizBtnFont": "Arial", "quizBtnFontSize": 28, "quizBtnTextColor": "#ffffff", "messageTitle": "Digital Visitor's Book", "messageHint": "Please leave your name, organization, signature, and message.", "messageFormBoxColor": "#ffffff", "messageFormBoxImage": "", "homeButtonText": "Home", "fullscreenButtonText": "Full Screen", "clearSigButtonText": "Clear Signature", "submitButtonText": "Submit Message", "homeBtnX": 0, "homeBtnY": 0, "homeBtnWidth": 90, "homeBtnHeight": 52, "homeBtnColor": "#e8eef8", "homeBtnImage": "", "homeBtnFont": "Arial", "homeBtnFontSize": 18, "homeBtnTextColor": "#17335f", "fullscreenBtnX": 100, "fullscreenBtnY": 0, "fullscreenBtnWidth": 130, "fullscreenBtnHeight": 52, "fullscreenBtnColor": "#17335f", "fullscreenBtnImage": "", "fullscreenBtnFont": "Arial", "fullscreenBtnFontSize": 18, "fullscreenBtnTextColor": "#ffffff", "clearSigBtnX": 0, "clearSigBtnY": 0, "clearSigBtnWidth": 180, "clearSigBtnHeight": 56, "clearSigBtnColor": "#e8eef8", "clearSigBtnImage": "", "clearSigBtnFont": "Arial", "clearSigBtnFontSize": 18, "clearSigBtnTextColor": "#17335f", "submitBtnX": 192, "submitBtnY": 0, "submitBtnWidth": 210, "submitBtnHeight": 56, "submitBtnColor": "#0b4fd7", "submitBtnImage": "", "submitBtnFont": "Arial", "submitBtnFontSize": 18, "submitBtnTextColor": "#ffffff", "videoUrl": "", "preloadVideo": "yes", "localVideoEnabled": "yes", "quizTitle": "Play Quiz", "quizText": "Scan this QR code to participate in the quiz.", "quizQrImage": "", "quizWebsiteUrl": "", "screenTitle": "Welcome to the Republic of Korea booth at IAEA's 70th General Conference!", "screenSubtitle": "Your messages inspire us and the world to build a safer and better future through nuclear cooperation.", "screenTitleFont": "Arial", "screenTitleSize": 54, "screenTitleColor": "#08377d", "screenSubtitleFont": "Arial", "screenSubtitleSize": 26, "screenSubtitleColor": "#142855", "visibleEntryCount": 6, "messageColorMode": "fixed", "messageFixedColor": "#0752c9", "messageRandomPalette": "#0752c9,#0b7a53,#c2410c,#7c3aed,#be123c,#0369a1,#a16207", "screenBgColor": "#eaf5ff", "screenBgImages": "", "screenBgInterval": 10, "scrollEnabled": "yes", "scrollSpeed": 18, "layoutMode": "vertical", "largeBoxX": 2, "largeBoxY": 180, "largeBoxWidth": 96, "largeBoxHeight": 560, "largeBoxColor": "rgba(255,255,255,0.62)", "largeBoxImage": "", "entryBoxWidth": 100, "entryBoxHeight": 82, "entryGap": 8, "entryPaddingX": 14, "entryPaddingY": 12, "entryBoxColor": "rgba(255,255,255,0.86)", "entryBoxImage": "", "nameFont": "Arial", "nameSize": 23, "nameWeight": "800", "nameColor": "#071632", "orgFont": "Arial", "orgSize": 18, "orgWeight": "400", "orgColor": "#415276", "signatureFont": "Arial", "signatureSize": 14, "signatureWeight": "400", "signatureColor": "#071632", "messageFont": "Arial", "messageSize": 24, "messageWeight": "800", "messageColor": "#0752c9", "timeFont": "Arial", "timeSize": 18, "timeWeight": "400", "timeColor": "#1a2946", "randomZoneX": 5, "randomZoneY": 160, "randomZoneWidth": 90, "randomZoneHeight": 650, "randomEntryWidth": 320, "randomEntryHeight": 160};
function mergedSettings(s){ return Object.assign({}, DEFAULT_SETTINGS, s || {}); }
function safeCssUrl(url){ url=String(url||'').trim(); return url ? `url("${url.replace(/"/g, '%22')}")` : 'none'; }
function bgStyle(color, image){ return image ? `${color} ${safeCssUrl(image)} center/cover no-repeat` : color; }
function fontList(){return ['Arial','Helvetica','Georgia','Times New Roman','Trebuchet MS','Verdana','Courier New','Noto Sans KR','sans-serif'];}
function normalizeUrl(url){ url=String(url||'').trim(); if(!url)return ''; if(!/^https?:\/\//i.test(url) && !url.startsWith('LOCAL')) url='https://'+url; return url; }

const settingsRef=db.ref('visitorBook/settings'), entriesRef=db.ref('visitorBook/entries'), actionRef=db.ref('visitorBook/screenAction');
let settings=mergedSettings(), entries=[], bgTimer=null, bgIndex=0, ticker=null, selectedLocalVideoUrl='';
settingsRef.on('value',snap=>{settings=mergedSettings(snap.val());applySettings();render();preload();});
entriesRef.on('value',snap=>{const v=snap.val()||{};entries=Object.keys(v).map(k=>Object.assign({key:k},v[k]));render();renderRegistry();});
function applySettings(){
 document.body.style.background=settings.screenBgColor;
 const imgs=String(settings.screenBgImages||'').split('\n').map(x=>x.trim()).filter(Boolean);
 if(bgTimer)clearInterval(bgTimer); if(imgs.length){function setBg(){document.body.style.background=`${settings.screenBgColor} url("${imgs[bgIndex%imgs.length]}") center/cover no-repeat`;bgIndex++;} setBg(); bgTimer=setInterval(setBg,Math.max(1,Number(settings.screenBgInterval||10))*1000);}
 screenTitle.textContent=settings.screenTitle; screenSubtitle.textContent=settings.screenSubtitle;
 screenTitle.style.cssText=`font-family:${settings.screenTitleFont};font-size:${settings.screenTitleSize}px;color:${settings.screenTitleColor}`;
 screenSubtitle.style.cssText=`font-family:${settings.screenSubtitleFont};font-size:${settings.screenSubtitleSize}px;color:${settings.screenSubtitleColor}`;
 largeBox.style.left=settings.largeBoxX+'vw'; largeBox.style.top=settings.largeBoxY+'px'; largeBox.style.width=settings.largeBoxWidth+'vw'; largeBox.style.height=settings.largeBoxHeight+'px'; largeBox.style.background=bgStyle(settings.largeBoxColor,settings.largeBoxImage);
 localVideoPicker.style.display=settings.localVideoEnabled==='no'?'none':'block';
}
function messageColor(i){if(settings.messageColorMode==='random'){const p=String(settings.messageRandomPalette||'').split(',').map(x=>x.trim()).filter(Boolean);return p.length?p[i%p.length]:settings.messageFixedColor}return settings.messageFixedColor;}
function entryHtml(e,i,random=false){const style=random?`position:absolute;left:${Math.random()*(settings.randomZoneWidth-10)+settings.randomZoneX}vw;top:${Math.random()*(settings.randomZoneHeight-80)+settings.randomZoneY}px;width:${settings.randomEntryWidth}px;height:${settings.randomEntryHeight}px;`:`width:${settings.entryBoxWidth}%;height:${settings.entryBoxHeight}px;margin-bottom:${settings.entryGap}px;padding:${settings.entryPaddingY}px ${settings.entryPaddingX}px;`;
 return `<article class="entry" style="${style}background:${bgStyle(settings.entryBoxColor,settings.entryBoxImage)}"><div><div class="name" style="font-family:${settings.nameFont};font-size:${settings.nameSize}px;font-weight:${settings.nameWeight};color:${settings.nameColor}">${escapeHtml(e.name)}</div><div class="org" style="font-family:${settings.orgFont};font-size:${settings.orgSize}px;font-weight:${settings.orgWeight};color:${settings.orgColor}">${escapeHtml(e.organization)}</div></div><div class="signature" style="font-family:${settings.signatureFont};font-size:${settings.signatureSize}px;font-weight:${settings.signatureWeight};color:${settings.signatureColor}"><img src="${e.signature||''}"></div><div class="message" style="font-family:${settings.messageFont};font-size:${settings.messageSize}px;font-weight:${settings.messageWeight};color:${messageColor(i)}">${escapeHtml(e.message)}</div><div class="time" style="font-family:${settings.timeFont};font-size:${settings.timeSize}px;font-weight:${settings.timeWeight};color:${settings.timeColor}">${fmt(e.createdAt)}</div></article>`}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))} function fmt(t){const d=new Date(Number(t)||Date.now());return d.toLocaleString()}
function render(){ if(ticker)cancelAnimationFrame(ticker); list.style.transform='translateY(0)'; let data=entries.filter(e=>e.showOnScreen!==false).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,100); const visible=Math.max(1,Math.min(100,Number(settings.visibleEntryCount||6))); if(settings.layoutMode==='random'){list.style.display='block';list.style.height='100%';list.innerHTML=data.slice(0,visible).map((e,i)=>entryHtml(e,i,true)).join('');return} list.style.display='flex'; let shown=data; if(!shown.length){list.innerHTML='<div style="padding:80px;text-align:center;font-size:30px">No messages yet.</div>';return} list.innerHTML=shown.map((e,i)=>entryHtml(e,i,false)).join(''); if(settings.scrollEnabled==='yes'&&shown.length>visible)startScroll();}
function startScroll(){let y=0,last=0;function tick(ts){if(!last)last=ts;const dt=ts-last;last=ts;y+=Number(settings.scrollSpeed||18)*dt/1000;const cycle=list.scrollHeight-largeBox.clientHeight;if(cycle>0&&y>cycle)y=0;list.style.transform=`translateY(${-y}px)`;ticker=requestAnimationFrame(tick)} ticker=requestAnimationFrame(tick)}
function renderRegistry(){registryBody.innerHTML=entries.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).map(e=>`<tr><td><input type="checkbox" ${e.showOnScreen!==false?'checked':''} onchange="toggleEntry('${e.key}',this.checked)"></td><td>${escapeHtml(e.name)}</td><td>${escapeHtml(e.organization)}</td><td>${escapeHtml(e.message)}</td><td>${fmt(e.createdAt)}</td></tr>`).join('')}
window.toggleEntry=(key,val)=>entriesRef.child(key).update({showOnScreen:val});
registryBtn.onclick=()=>registry.style.display='block'; registryClose.onclick=()=>registry.style.display='none'; fullscreenBtn.onclick=()=>document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().catch(()=>{});
localVideoFile.onchange=()=>{const f=localVideoFile.files[0]; if(f){selectedLocalVideoUrl=URL.createObjectURL(f);localVideoStatus.textContent='Selected: '+f.name}};
function getYouTubeId(u){let m=String(u).match(/[?&]v=([^&]+)/)||String(u).match(/youtu\.be\/([^?&/]+)/);return m?m[1]:''} function embedUrl(u){const y=getYouTubeId(u);return y?'https://www.youtube.com/embed/'+y+'?autoplay=1':''}
function openVideo(url){url=String(url||'').trim(); if(url.toUpperCase()==='LOCAL')url=selectedLocalVideoUrl; if(!url){alert('No video URL or local video selected.');return} videoOverlay.style.display='block'; const emb=embedUrl(url); if(emb){videoPlayer.style.display='none';videoFrame.style.display='block';videoFrame.src=emb}else{videoFrame.style.display='none';videoPlayer.style.display='block';videoPlayer.src=url;videoPlayer.play().catch(()=>{})}}
function closeVid(){videoOverlay.style.display='none';videoPlayer.pause();videoPlayer.removeAttribute('src');videoFrame.removeAttribute('src')} closeVideo.onclick=closeVid;
function preload(){if(settings.preloadVideo==='yes'&&settings.videoUrl&&!embedUrl(settings.videoUrl)&&settings.videoUrl.toUpperCase()!=='LOCAL'){videoPlayer.preload='auto';videoPlayer.src=settings.videoUrl;videoPlayer.load();}}
actionRef.on('value',snap=>{const a=snap.val(); if(!a||!a.type)return; if(a.type==='open-video-window')openVideo(a.url); if(a.type==='open-quiz-window'){const u=normalizeUrl(a.url||settings.quizWebsiteUrl); if(u)window.open(u,'quiz','popup=yes,width='+window.screen.availWidth+',height='+window.screen.availHeight+',left=0,top=0')} if(a.type==='show-visitor-book')closeVid();});
</script></body></html>
