<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Visitor Input</title>
<style>
*{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;font-family:Arial,sans-serif;color:#122044;overflow:hidden}
.screen{display:none;position:fixed;inset:0;width:100vw;height:100dvh;overflow:auto;padding:28px} .screen.active{display:block}
:root{--input-home-box-x:0px;--input-home-box-y:0px;--input-home-box-width:900px;}
.homeCard,.formCard,.quizCard{border-radius:28px;box-shadow:0 12px 44px #7692b344;padding:34px;max-width:900px;margin:0 auto}
.homeCard{position:relative;min-height:420px;text-align:center;width:min(92vw,var(--input-home-box-width));transform:translate(var(--input-home-box-x),var(--input-home-box-y));} .homeBtnArea{position:relative;height:240px;margin-top:28px}
.menuBtn,.smallBtn,.actionBtn{position:absolute;display:grid;place-items:center;border:0;border-radius:16px;font-weight:900;cursor:pointer;text-align:center}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px} label{display:block;font-weight:800;margin:14px 0 8px} input,textarea{width:100%;font-size:20px;padding:14px;border:2px solid #c7d7ef;border-radius:14px} textarea{height:110px}
.sigbox{height:240px;border:2px dashed #8cb0dd;border-radius:18px;background:white;touch-action:none} canvas{width:100%;height:100%;display:block}
.actions{position:relative;height:70px;margin-top:18px} .topActions{position:relative;height:66px;margin-bottom:12px}
.ok{display:none;color:#11803a;font-weight:900;margin-top:12px} .qrImg{max-width:min(72vw,430px);display:block;margin:20px auto;border-radius:18px}
@media(max-width:720px){.row{grid-template-columns:1fr}}
</style></head><body>
<section id="homeScreen" class="screen active"><div class="homeCard" id="homeCard"><h1 id="homeTitle"></h1><p id="homeHint"></p><div class="homeBtnArea"><button id="leaveBtn" class="menuBtn"></button><button id="videoBtn" class="menuBtn"></button><button id="quizBtn" class="menuBtn"></button></div></div></section>
<section id="messageScreen" class="screen"><div class="topActions"><button id="homeBtn" class="smallBtn"></button><button id="fullscreenBtn" class="smallBtn"></button></div><div class="formCard" id="formCard"><h1 id="messageTitle"></h1><p id="messageHint"></p><div class="row"><div><label>Name</label><input id="name"></div><div><label>Organization / Affiliation</label><input id="organization"></div></div><label>Message</label><textarea id="message"></textarea><label>Signature</label><div class="sigbox"><canvas id="canvas"></canvas></div><div class="actions"><button id="clearSigBtn" class="actionBtn"></button><button id="submitBtn" class="actionBtn"></button></div><div id="ok" class="ok">Thank you. Your message has been submitted.</div><div id="status"></div></div></section>
<section id="quizScreen" class="screen"><button id="quizHomeBtn" class="smallBtn" style="position:relative;left:0;top:0;width:100px;height:52px">Home</button><div class="quizCard"><h1 id="quizTitle"></h1><p id="quizText"></p><img id="quizQr" class="qrImg" alt="Quiz QR"></div></section>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

const DEFAULT_SETTINGS = {"indexTitle": "Digital Visitor's Book", "indexTitleFont": "Arial", "indexTitleSize": 36, "indexTitleColor": "#0b4fd7", "indexSubtitle": "Firebase online version for GitHub Pages", "indexBgColor": "#eaf4ff", "indexBgImage": "", "indexBoxColor": "#ffffff", "indexBoxImage": "", "indexBoxWidth": 680, "indexBoxTop": 0, "adminBtnText": "Admin / Start", "inputBtnText": "Open Input Screen", "screenBtnText": "Open Screen Display", "adminBtnX": 0, "adminBtnY": 0, "adminBtnWidth": 100, "adminBtnHeight": 60, "adminBtnColor": "#0b4fd7", "adminBtnImage": "", "adminBtnFont": "Arial", "adminBtnFontSize": 22, "adminBtnTextColor": "#ffffff", "inputBtnX": 0, "inputBtnY": 0, "inputBtnWidth": 100, "inputBtnHeight": 60, "inputBtnColor": "#7c3aed", "inputBtnImage": "", "inputBtnFont": "Arial", "inputBtnFontSize": 22, "inputBtnTextColor": "#ffffff", "screenBtnX": 0, "screenBtnY": 0, "screenBtnWidth": 100, "screenBtnHeight": 60, "screenBtnColor": "#209147", "screenBtnImage": "", "screenBtnFont": "Arial", "screenBtnFontSize": 22, "screenBtnTextColor": "#ffffff", "inputBgColor": "#eaf4ff", "inputBgImage": "", "inputBgImages": "", "inputBgInterval": 10, "inputHomeBoxX": 0, "inputHomeBoxY": 0, "inputHomeBoxWidth": 900, "inputHomeBoxColor": "#ffffff", "inputHomeBoxImage": "", "inputHomeTitle": "Digital Visitor's Book", "inputHomeHint": "Please choose one option.", "leaveBtnText": "Leave a Message", "videoBtnText": "Watch Video", "quizBtnText": "Play Quiz", "leaveBtnX": 0, "leaveBtnY": 0, "leaveBtnWidth": 48, "leaveBtnHeight": 88, "leaveBtnColor": "#0b4fd7", "leaveBtnImage": "", "leaveBtnFont": "Arial", "leaveBtnFontSize": 28, "leaveBtnTextColor": "#ffffff", "videoBtnX": 52, "videoBtnY": 0, "videoBtnWidth": 48, "videoBtnHeight": 88, "videoBtnColor": "#7c3aed", "videoBtnImage": "", "videoBtnFont": "Arial", "videoBtnFontSize": 28, "videoBtnTextColor": "#ffffff", "quizBtnX": 0, "quizBtnY": 108, "quizBtnWidth": 100, "quizBtnHeight": 88, "quizBtnColor": "#209147", "quizBtnImage": "", "quizBtnFont": "Arial", "quizBtnFontSize": 28, "quizBtnTextColor": "#ffffff", "messageTitle": "Digital Visitor's Book", "messageHint": "Please leave your name, organization, signature, and message.", "messageFormBoxColor": "#ffffff", "messageFormBoxImage": "", "homeButtonText": "Home", "fullscreenButtonText": "Full Screen", "clearSigButtonText": "Clear Signature", "submitButtonText": "Submit Message", "homeBtnX": 0, "homeBtnY": 0, "homeBtnWidth": 90, "homeBtnHeight": 52, "homeBtnColor": "#e8eef8", "homeBtnImage": "", "homeBtnFont": "Arial", "homeBtnFontSize": 18, "homeBtnTextColor": "#17335f", "fullscreenBtnX": 100, "fullscreenBtnY": 0, "fullscreenBtnWidth": 130, "fullscreenBtnHeight": 52, "fullscreenBtnColor": "#17335f", "fullscreenBtnImage": "", "fullscreenBtnFont": "Arial", "fullscreenBtnFontSize": 18, "fullscreenBtnTextColor": "#ffffff", "clearSigBtnX": 0, "clearSigBtnY": 0, "clearSigBtnWidth": 180, "clearSigBtnHeight": 56, "clearSigBtnColor": "#e8eef8", "clearSigBtnImage": "", "clearSigBtnFont": "Arial", "clearSigBtnFontSize": 18, "clearSigBtnTextColor": "#17335f", "submitBtnX": 192, "submitBtnY": 0, "submitBtnWidth": 210, "submitBtnHeight": 56, "submitBtnColor": "#0b4fd7", "submitBtnImage": "", "submitBtnFont": "Arial", "submitBtnFontSize": 18, "submitBtnTextColor": "#ffffff", "videoUrl": "", "preloadVideo": "yes", "localVideoEnabled": "yes", "quizTitle": "Play Quiz", "quizText": "Scan this QR code to participate in the quiz.", "quizQrImage": "", "quizWebsiteUrl": "", "screenTitle": "Welcome to the Republic of Korea booth at IAEA's 70th General Conference!", "screenSubtitle": "Your messages inspire us and the world to build a safer and better future through nuclear cooperation.", "screenTitleFont": "Arial", "screenTitleSize": 54, "screenTitleColor": "#08377d", "screenSubtitleFont": "Arial", "screenSubtitleSize": 26, "screenSubtitleColor": "#142855", "visibleEntryCount": 6, "messageColorMode": "fixed", "messageFixedColor": "#0752c9", "messageRandomPalette": "#0752c9,#0b7a53,#c2410c,#7c3aed,#be123c,#0369a1,#a16207", "screenBgColor": "#eaf5ff", "screenBgImages": "", "screenBgInterval": 10, "scrollEnabled": "yes", "scrollSpeed": 18, "layoutMode": "vertical", "largeBoxX": 2, "largeBoxY": 180, "largeBoxWidth": 96, "largeBoxHeight": 560, "largeBoxColor": "rgba(255,255,255,0.62)", "largeBoxImage": "", "entryBoxWidth": 100, "entryBoxHeight": 82, "entryGap": 8, "entryPaddingX": 14, "entryPaddingY": 12, "entryBoxColor": "rgba(255,255,255,0.86)", "entryBoxImage": "", "nameFont": "Arial", "nameSize": 23, "nameWeight": "800", "nameColor": "#071632", "orgFont": "Arial", "orgSize": 18, "orgWeight": "400", "orgColor": "#415276", "signatureFont": "Arial", "signatureSize": 14, "signatureWeight": "400", "signatureColor": "#071632", "messageFont": "Arial", "messageSize": 24, "messageWeight": "800", "messageColor": "#0752c9", "timeFont": "Arial", "timeSize": 18, "timeWeight": "400", "timeColor": "#1a2946", "randomZoneX": 5, "randomZoneY": 160, "randomZoneWidth": 90, "randomZoneHeight": 650, "randomEntryWidth": 320, "randomEntryHeight": 160};
function mergedSettings(s){ return Object.assign({}, DEFAULT_SETTINGS, s || {}); }
function safeCssUrl(url){ url=String(url||'').trim(); return url ? `url("${url.replace(/"/g, '%22')}")` : 'none'; }
function bgStyle(color, image){ return image ? `${color} ${safeCssUrl(image)} center/cover no-repeat` : color; }
function fontList(){return ['Arial','Helvetica','Georgia','Times New Roman','Trebuchet MS','Verdana','Courier New','Noto Sans KR','sans-serif'];}
function normalizeUrl(url){ url=String(url||'').trim(); if(!url)return ''; if(!/^https?:\/\//i.test(url) && !url.startsWith('LOCAL')) url='https://'+url; return url; }

const settingsRef=db.ref('visitorBook/settings'), entriesRef=db.ref('visitorBook/entries'), actionRef=db.ref('visitorBook/screenAction');
let settings=mergedSettings(), inputBgTimer=null, inputBgIndex=0;
settingsRef.on('value',snap=>{settings=mergedSettings(snap.val());apply(settings);});

function applyInputBackground(s){
  if(inputBgTimer){clearInterval(inputBgTimer); inputBgTimer=null;}
  const urls = String(s.inputBgImages || '').split('\n').map(x=>x.trim()).filter(Boolean);
  function setBg(url){
    const value = url ? bgStyle(s.inputBgColor, url) : bgStyle(s.inputBgColor, s.inputBgImage);
    document.body.style.background=value;
    document.querySelectorAll('.screen').forEach(x=>x.style.background=value);
  }
  if(urls.length){
    setBg(urls[inputBgIndex % urls.length]);
    inputBgIndex++;
    inputBgTimer=setInterval(()=>{
      setBg(urls[inputBgIndex % urls.length]);
      inputBgIndex++;
    }, Math.max(1, Number(s.inputBgInterval || 10))*1000);
  }else{
    setBg('');
  }
}

function setBtn(el,key,text){ el.textContent=text; el.style.left=settings[key+'X']+'%'; el.style.top=settings[key+'Y']+'px'; el.style.width=settings[key+'Width']+'%'; el.style.height=settings[key+'Height']+'px'; el.style.background=bgStyle(settings[key+'Color'],settings[key+'Image']); el.style.fontFamily=settings[key+'Font']; el.style.fontSize=settings[key+'FontSize']+'px'; el.style.color=settings[key+'TextColor']; }
function apply(s){
 applyInputBackground(s); document.documentElement.style.setProperty('--input-home-box-x', Number(s.inputHomeBoxX||0)+'px'); document.documentElement.style.setProperty('--input-home-box-y', Number(s.inputHomeBoxY||0)+'px'); document.documentElement.style.setProperty('--input-home-box-width', Number(s.inputHomeBoxWidth||900)+'px');
 homeCard.style.background=bgStyle(s.inputHomeBoxColor,s.inputHomeBoxImage); homeTitle.textContent=s.inputHomeTitle; homeHint.textContent=s.inputHomeHint;
 setBtn(leaveBtn,'leaveBtn',s.leaveBtnText); setBtn(videoBtn,'videoBtn',s.videoBtnText); setBtn(quizBtn,'quizBtn',s.quizBtnText);
 formCard.style.background=bgStyle(s.messageFormBoxColor,s.messageFormBoxImage); messageTitle.textContent=s.messageTitle; messageHint.textContent=s.messageHint;
 setBtn(homeBtn,'homeBtn',s.homeButtonText); setBtn(fullscreenBtn,'fullscreenBtn',s.fullscreenButtonText); setBtn(clearSigBtn,'clearSigBtn',s.clearSigButtonText); setBtn(submitBtn,'submitBtn',s.submitButtonText);
 quizTitle.textContent=s.quizTitle; quizText.textContent=s.quizText; if(s.quizQrImage) quizQr.src=s.quizQrImage;
}
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active')); document.getElementById(id).classList.add('active'); setTimeout(resize,80);}
function sendAction(a){return actionRef.set(Object.assign({createdAt:firebase.database.ServerValue.TIMESTAMP},a));}
leaveBtn.onclick=()=>{show('messageScreen'); sendAction({type:'show-visitor-book'});};
videoBtn.onclick=()=>sendAction({type:'open-video-window',url:settings.videoUrl});
quizBtn.onclick=()=>{show('quizScreen'); sendAction({type:'open-quiz-window',url:settings.quizWebsiteUrl});};
homeBtn.onclick=()=>show('homeScreen'); quizHomeBtn.onclick=()=>show('homeScreen');
fullscreenBtn.onclick=()=>{if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});};
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let drawing=false,hasSig=false,last=null,isSubmitting=false;
function resize(){const r=canvas.getBoundingClientRect();if(!r.width)return;const old=hasSig?canvas.toDataURL():null,d=devicePixelRatio||1;canvas.width=r.width*d;canvas.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);ctx.lineWidth=4;ctx.lineCap='round';ctx.strokeStyle='#111';if(old){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old;}}
function pos(e){const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}}function start(e){e.preventDefault();drawing=true;last=pos(e)}function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;hasSig=true}function end(){drawing=false}
['mousedown','touchstart'].forEach(x=>canvas.addEventListener(x,start,{passive:false}));['mousemove','touchmove'].forEach(x=>canvas.addEventListener(x,move,{passive:false}));['mouseup','mouseleave','touchend','touchcancel'].forEach(x=>canvas.addEventListener(x,end));window.addEventListener('resize',resize);setTimeout(resize,200);
clearSigBtn.onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);hasSig=false};
function makeId(name,org,msg,sig){const raw=[name,org,msg,sig].join('|');let h=0;for(let i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h|=0}return 'entry_'+Math.abs(h)+'_'+raw.length;}
submitBtn.onclick=async()=>{if(isSubmitting)return;const n=name.value.trim(),o=organization.value.trim(),m=message.value.trim(); if(!n||!o||!m||!hasSig){alert('Please enter name, organization, message, and signature.');return} isSubmitting=true; submitBtn.disabled=true; const sig=canvas.toDataURL('image/png'), id=makeId(n,o,m,sig); try{await entriesRef.child(id).set({id,name:n,organization:o,message:m,signature:sig,createdAt:firebase.database.ServerValue.TIMESTAMP,showOnScreen:true}); name.value='';organization.value='';message.value='';ctx.clearRect(0,0,canvas.width,canvas.height);hasSig=false;ok.style.display='block';setTimeout(()=>ok.style.display='none',2000); await sendAction({type:'show-visitor-book'});}catch(e){alert('Firebase error: '+e.message)}finally{isSubmitting=false;submitBtn.disabled=false}};
</script></body></html>
